# Rainfall API nginx excerpt
#
# Source on quark01:
# /etc/nginx/sites-available/pcc-bot01-8080.conf
#
# This excerpt contains only the route used by quark01-rainfall-api.
# The same server also has /mcp and /api/admin/ routes for another app;
# those routes are intentionally omitted here.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
