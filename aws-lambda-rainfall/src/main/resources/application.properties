# Quarkus Lambda設定
quarkus.lambda.handler=rainfall

# JMA API設定（気象庁API）
quarkus.rest-client.jma-api.url=https://www.jma.go.jp/bosai
quarkus.rest-client.jma-api.scope=jakarta.inject.Singleton

# Quark01サーバーAPI設定
quarkus.rest-client.quark01-api.url=${QUARK01_API_URL:http://localhost:8080}
quarkus.rest-client.quark01-api.scope=jakarta.inject.Singleton

# 認証トークン（環境変数から取得）
quarkus.rest-client.quark01-api.headers.Authorization=Bearer ${QUARK01_API_TOKEN:dummy-token-for-dev}

# タイムアウト設定
quarkus.rest-client.jma-api.connect-timeout=10000
quarkus.rest-client.jma-api.read-timeout=30000
quarkus.rest-client.quark01-api.connect-timeout=5000
quarkus.rest-client.quark01-api.read-timeout=10000

# ログ設定
quarkus.log.level=INFO
quarkus.log.category."com.example".level=DEBUG

# Lambda設定
quarkus.lambda.enable-polling-jvm-mode=true
